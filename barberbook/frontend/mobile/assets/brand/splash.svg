<?xml version="1.0" encoding="UTF-8"?>
<!--
  Splash logomark. Composited on `#FAF7F2` (cream) by Expo via the
  splash configuration in app.json.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="pole" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B1A18"/>
      <stop offset="50%" stop-color="#D4322C"/>
      <stop offset="100%" stop-color="#1B1A18"/>
    </linearGradient>
  </defs>
  <g transform="translate(512 432) rotate(20)">
    <rect x="-110" y="-280" width="220" height="560" rx="110" fill="url(#pole)"/>
    <rect x="-110" y="-280" width="220" height="80" rx="40" fill="#FAF7F2"/>
    <rect x="-110" y="200" width="220" height="80" rx="40" fill="#FAF7F2"/>
  </g>
  <text x="512" y="900" font-family="Anton, 'Helvetica Neue', Arial, sans-serif"
        font-size="160" font-weight="800" letter-spacing="16"
        fill="#1B1A18" text-anchor="middle">BARBERBOOK</text>
</svg>
